name: Docker Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 支持手动触发

jobs:
  # 任务 1: 验证配置文件
  validate-config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Validate YAML files
        run: |
          python << 'EOF'
          import yaml
          import sys

          # 检查 scheduler.yaml
          try:
              with open('config/scheduler.yaml', 'r') as f:
                  config = yaml.safe_load(f)
              print('✓ config/scheduler.yaml 验证通过')
              print(f'  - 默认模型: {config.get("llm", {}).get("default_model", "N/A")}')
              print(f'  - 定时任务数: {len(config.get("cron_jobs", []))}')
          except Exception as e:
              print(f'✗ config/scheduler.yaml 错误: {e}')
              sys.exit(1)

          # 检查 docker-compose.yml
          try:
              with open('docker-compose.yml', 'r') as f:
                  compose = yaml.safe_load(f)
              print('✓ docker-compose.yml 验证通过')
              print(f'  - 服务数: {len(compose.get("services", {}))}')
              print(f'  - 服务列表: {list(compose.get("services", {}).keys())}')
          except Exception as e:
              print(f'✗ docker-compose.yml 错误: {e}')
              sys.exit(1)

          # 检查 Dockerfile
          with open('Dockerfile', 'r') as f:
              dockerfile = f.read()
          if 'FROM python' in dockerfile:
              print('✓ Dockerfile 格式正确')
          else:
              print('✗ Dockerfile 格式错误')
              sys.exit(1)
          EOF

  # 任务 2: 构建 Docker 镜像
  build-image:
    runs-on: ubuntu-latest
    needs: validate-config
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t ai-scheduler:test .
          echo "✓ Docker 镜像构建成功"

      - name: Test Docker image
        run: |
          # 测试镜像是否可以运行
          docker run --rm ai-scheduler:test python -c "import scheduler_skill; print('✓ 模块导入成功')"

      - name: Check image size
        run: |
          docker images ai-scheduler:test --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"

  # 任务 3: 集成测试（需要 API Keys）
  integration-test:
    runs-on: ubuntu-latest
    needs: [validate-config, build-image]
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[test]')
    # 注意：此任务需要配置 GitHub Secrets
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          MOONSHOT_API_KEY=${{ secrets.MOONSHOT_API_KEY }}
          TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}
          AMAP_WEBSERVICE_KEY=${{ secrets.AMAP_WEBSERVICE_KEY }}
          LOG_LEVEL=DEBUG
          EOF

      - name: Build and run tests
        run: |
          docker-compose up -d scheduler-mcp
          sleep 10
          docker-compose ps
          docker-compose logs --tail=50 scheduler-mcp
          docker-compose down

  # 任务 4: 生成报告
  report:
    runs-on: ubuntu-latest
    needs: [validate-config, build-image]
    if: always()
    steps:
      - name: Generate report
        run: |
          echo "## Docker 测试报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 测试项 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 配置验证 | ${{ needs.validate-config.result == 'success' && '✅ 通过' || '❌ 失败' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 镜像构建 | ${{ needs.build-image.result == 'success' && '✅ 通过' || '❌ 失败' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 集成测试 | ${{ needs.integration-test.result == 'success' && '✅ 通过' || needs.integration-test.result == 'skipped' && '⏭️ 跳过' || '❌ 失败' }} |" >> $GITHUB_STEP_SUMMARY
