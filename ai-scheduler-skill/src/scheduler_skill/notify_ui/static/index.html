<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Scheduler - 任务通知</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }

        .status-bar {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: white;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .messages-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            animation: slideIn 0.3s ease-out;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .message-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.15);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-card.info {
            border-left: 5px solid #3b82f6;
        }

        .message-card.success {
            border-left: 5px solid #10b981;
        }

        .message-card.warning {
            border-left: 5px solid #f59e0b;
        }

        .message-card.error {
            border-left: 5px solid #ef4444;
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .message-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #1f2937;
        }

        .message-time {
            font-size: 0.85rem;
            color: #6b7280;
        }

        .message-content {
            color: #4b5563;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .message-task {
            display: inline-block;
            background: #f3f4f6;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #6b7280;
            margin-top: 10px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .connection-lost {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #ef4444;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            display: none;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⏰ AI Scheduler</h1>
            <p>智能任务调度通知中心</p>
        </div>

        <div class="status-bar">
            <div class="status-indicator">
                <div class="status-dot"></div>
                <span id="status-text">连接中...</span>
            </div>
            <div id="client-count">0 个客户端在线</div>
        </div>

        <div class="messages-container" id="messages">
            <div class="empty-state">
                <div class="empty-state-icon">📭</div>
                <h3>暂无通知</h3>
                <p>等待任务触发...</p>
            </div>
        </div>
    </div>

    <div class="connection-lost" id="connection-lost">
        ⚠️ 连接断开，正在重连...
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const messagesContainer = document.getElementById('messages');
        const statusText = document.getElementById('status-text');
        const statusDot = document.querySelector('.status-dot');
        const connectionLost = document.getElementById('connection-lost');
        const toast = document.getElementById('toast');

        let ws = null;
        let reconnectAttempts = 0;
        let maxReconnectAttempts = 10;
        let reconnectDelay = 1000;

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleString('zh-CN', {
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function addMessage(data) {
            // 移除空状态提示
            const emptyState = messagesContainer.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }

            const card = document.createElement('div');
            card.className = `message-card ${data.msgType}`;
            card.innerHTML = `
                <div class="message-header">
                    <div class="message-title">${escapeHtml(data.title)}</div>
                    <div class="message-time">${formatTime(data.timestamp)}</div>
                </div>
                <div class="message-content">${escapeHtml(data.content)}</div>
                ${data.taskName ? `<div class="message-task">📋 ${escapeHtml(data.taskName)}</div>` : ''}
            `;

            messagesContainer.insertBefore(card, messagesContainer.firstChild);

            // 限制消息数量，最多保留 50 条
            const cards = messagesContainer.querySelectorAll('.message-card');
            if (cards.length > 50) {
                cards[cards.length - 1].remove();
            }

            // 播放提示音（可选）
            playNotificationSound();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function playNotificationSound() {
            // 创建简单的提示音
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                oscillator.frequency.value = 800;
                oscillator.type = 'sine';
                gainNode.gain.value = 0.1;

                oscillator.start();
                oscillator.stop(audioContext.currentTime + 0.1);
            } catch (e) {
                // 忽略音频错误
            }
        }

        function connect() {
            const wsUrl = `ws://${window.location.host}/ws`;
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log('WebSocket connected');
                statusText.textContent = '已连接';
                statusDot.style.background = '#4ade80';
                connectionLost.style.display = 'none';
                reconnectAttempts = 0;
                showToast('已连接到服务器');
            };

            ws.onmessage = (event) => {
                console.log("[WebSocket] Received message, length:", event.data.length);
                try {
                    const message = JSON.parse(event.data);
                    if (message.type === 'notification' && message.data) {
                        addMessage(message.data);
                    }
                } catch (e) {
                    console.error('Failed to parse message:', e);
                }
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                statusText.textContent = '连接错误';
                statusDot.style.background = '#ef4444';
            };

            ws.onclose = () => {
                console.log('WebSocket closed');
                statusText.textContent = '已断开';
                statusDot.style.background = '#f59e0b';
                connectionLost.style.display = 'block';

                // 尝试重连
                if (reconnectAttempts < maxReconnectAttempts) {
                    reconnectAttempts++;
                    setTimeout(connect, reconnectDelay);
                    reconnectDelay = Math.min(reconnectDelay * 1.5, 10000); // 指数退避，最大10秒
                } else {
                    statusText.textContent = '重连失败';
                    showToast('连接已断开，请刷新页面重试');
                }
            };
        }

        // 初始化连接
        connect();

        // 页面可见性变化时检查连接
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && ws && ws.readyState !== WebSocket.OPEN) {
                reconnectAttempts = 0;
                reconnectDelay = 1000;
                connect();
            }
        });
    </script>
</body>
</html>
